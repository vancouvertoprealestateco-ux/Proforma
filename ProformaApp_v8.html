const U = {
  // Format as Canadian dollars
  $: n => {
    if(n===null||n===undefined||n==='') return '—';
    const num = typeof n==='string' ? parseFloat(n.replace(/,/g,'')) : n;
    if(isNaN(num)) return '—';
    return '$' + Math.round(num).toLocaleString('en-CA');
  },
  // Format number with commas
  n: (n, dec=0) => {
    if(n===null||n===undefined||n==='') return '—';
    const num = typeof n==='string' ? parseFloat(n.replace(/,/g,'')) : n;
    if(isNaN(num)) return '—';
    return num.toLocaleString('en-CA', {minimumFractionDigits:dec, maximumFractionDigits:dec});
  },
  pct:  n => (n && !isNaN(n)) ? Number(n).toFixed(2)+'%' : '—',
  x:    n => (n && !isNaN(n)) ? Number(n).toFixed(2)+'x' : '—',
  psf:  n => (n && !isNaN(n)) ? '$'+Number(n).toFixed(2)+'/SF' : '—',
  // Safe parse — strips commas, returns 0 on invalid
  p: (v, fb=0) => {
    if(v===null||v===undefined||v==='') return fb;
    const n = parseFloat(String(v).replace(/,/g,''));
    return isNaN(n) ? fb : n;
  },
  // Debounce factory
  debounce: (fn, ms) => {
    let t;
    return (...a) => { clearTimeout(t); t = setTimeout(()=>fn(...a), ms); };
  },
  clamp: (v,min,max) => Math.min(Math.max(v,min),max),
  // Format input display value with commas
  fmtDisplay: (raw) => {
    if(!raw && raw!==0) return '';
    const n = parseFloat(String(raw).replace(/,/g,''));
    if(isNaN(n)) return raw;
    return n.toLocaleString('en-CA');
  },
};

// ── FINANCIAL ENGINE ──────────────────────────────────────────────
// Single pure function — all inputs in, all outputs out
// No side effects. Fully deterministic. Easy to unit test.
const Calc = {
  run(s) {
    const p = U.p;
    // Revenue inputs
    const netSF      = p(s.netSF);
    const rent       = p(s.rent);
    const parkStalls = p(s.parkingRes) + p(s.parkingVis);
    const parkRate   = p(s.parkRate, 175);
    const bikeStalls = p(s.bike);
    const vacRate    = p(s.vacancy, 3) / 100;
    const opexPct    = p(s.opex, 32) / 100;
    const cap        = p(s.cap, 4.25) / 100;
    const saleableSF = p(s.saleable);
    const salePSF    = p(s.salePSF);

    // Revenue calcs
    const gri     = netSF * rent * 12;
    const sundry  = (parkStalls * parkRate * 12) + (bikeStalls * 25 * 12);
    const egi     = (gri + sundry) * (1 - vacRate);
    const opex    = egi * opexPct;
    const noi     = egi - opex;
    const stabVal = cap > 0 ? noi / cap : 0;
    const saleVal = saleableSF > 0 && salePSF > 0 ? saleableSF * salePSF : 0;

    // Cost inputs
    const land      = p(s.land);
    const gfa       = p(s.gfa);
    const hardPSF   = p(s.hardPSF);
    const contPct   = p(s.contingency, 5) / 100;
    const soft      = p(s.softTotal);
    const muni      = p(s.muniTotal);
    const pttOn     = s.pttEnabled !== false;
    const gstOn     = s.gstEnabled !== false;

    // Cost calcs
    const ptt       = pttOn ? land * 0.03 : 0;
    const gst       = gstOn ? land * 0.05 : 0;
    const landTot   = land + ptt + gst;
    const hard      = gfa * hardPSF * (1 + contPct);
    const preFin    = landTot + hard + soft + muni;

    // Financing inputs
    const ltv       = p(s.ltv, 85) / 100;
    const permRate  = p(s.permRate, 4.25) / 100;
    const amort     = p(s.amort, 40);
    const ltc       = p(s.ltc, 85) / 100;
    const constRate = p(s.constRate, 4.5) / 100;
    const constMo   = p(s.constMo, 24);
    const cmhcPrem  = p(s.cmhcPrem, 3.5) / 100;

    // Financing calcs
    const constLoan = preFin * ltc;
    const intPaid   = constLoan * constRate * (constMo / 12) * 0.55;
    const finFees   = constLoan * 0.01;
    const cmhcFee   = constLoan * cmhcPrem;
    const finCost   = intPaid + finFees + cmhcFee;
    const tdc       = preFin + finCost;
    const profit    = stabVal - tdc;
    const loanAmt   = stabVal * ltv;

    // Mortgage constant
    const mr = permRate / 12;
    const n  = amort * 12;
    const mc = (mr > 0 && n > 0)
      ? (mr * Math.pow(1+mr, n)) / (Math.pow(1+mr, n) - 1)
      : 0;
    const ads    = loanAmt * mc * 12;
    const dscr   = ads > 0 ? noi / ads : 0;
    const equity = preFin * (1 - ltc);
    const roc    = tdc > 0 ? (noi / tdc) * 100 : 0;
    const units  = p(s.units);
    const valPerUnit = units > 0 ? stabVal / units : 0;
    const valPerSF   = netSF > 0 ? stabVal / netSF : 0;
    const efficiency = gfa > 0 && netSF > 0 ? (netSF / gfa) * 100 : 0;

    // RLV
    const commPct    = p(s.commissionPct, 3.5) / 100;
    const devProfPct = p(s.devProfitPct, 15) / 100;
    const netProc    = stabVal * (1 - commPct);
    const construct  = hard + soft + muni;
    const rlvBefore  = netProc - construct;
    const devProfit  = netProc * devProfPct;
    const rlv        = rlvBefore - devProfit;
    const siteSF     = p(s.siteSF);
    const rlvPerSF   = siteSF > 0 ? rlv / siteSF : 0;
    const rlvVar     = rlv - land;

    return {
      gri, sundry, egi, opex, noi, stabVal, saleVal,
      ptt, gst, landTot, hard, preFin, intPaid, finFees, cmhcFee,
      finCost, tdc, profit, loanAmt, ads, dscr, equity, roc,
      valPerUnit, valPerSF, efficiency, soft, muni,
      netProc, construct, rlvBefore, devProfit, rlv, rlvPerSF, rlvVar,
    };
  },

  // Validate minimum required fields before generate
  validate(s) {
    const required = [
      { key:'netSF',   label:'Net Leasable SF',     sheet:'Dev. Potential' },
      { key:'gfa',     label:'Gross Floor Area',     sheet:'Dev. Potential' },
      { key:'rent',    label:'Average Rent',         sheet:'Revenue'        },
      { key:'cap',     label:'Cap Rate',             sheet:'Revenue'        },
      { key:'land',    label:'Land Price',           sheet:'Dev. Costs'     },
      { key:'hardPSF', label:'Hard Cost Rate ($/SF)',sheet:'Dev. Costs'     },
      { key:'permRate',label:'Permanent Rate',       sheet:'Financing'      },
      { key:'amort',   label:'Amortization',         sheet:'Financing'      },
    ];
    const missing = required.filter(r => !U.p(s[r.key]));
    const warnings = [];
    if(U.p(s.cap) <= 0)       warnings.push('Cap rate must be greater than 0');
    if(U.p(s.ltv) > 95)       warnings.push('LTV above 95% — confirm with lender');
    if(U.p(s.permRate) > 15)  warnings.push('Interest rate above 15% — please verify');
    return { missing, warnings };
  },
};

// ── STATE MANAGER ─────────────────────────────────────────────────
class AppState {
  constructor() {
    this._state  = makeInitialState();
    this._listeners = [];
    this._saveTimer = null;
    this._restore();
    this._recomputeTotals();
  }

  get() { return this._state; }

  // Immutable update — always creates new state object
  set(updates) {
    this._state = { ...this._state, ...updates, isDirty: true };
    this._recomputeTotals();
    this._notify();
    this._scheduleSave();
  }

  // Update a single property in the properties array
  setProp(id, updates) {
    const props = this._state.properties.map(p =>
      p.id === id ? { ...p, ...updates } : p
    );
    // Sync combined siteSF to main inputs
    const totalSF = props.reduce((s, p) => s + U.p(p.siteSF), 0);
    const stateUpdate = { properties: props };
    if(totalSF > 0) stateUpdate.siteSF = String(totalSF);
    // Sync other property fields to proforma if first property
    const primary = props.find(p => p.id === id);
    if(primary && primary.verified) {
      if(primary.frontage && !this._state.frontage) stateUpdate.frontage = primary.frontage;
      if(primary.depth    && !this._state.depth)    stateUpdate.depth    = primary.depth;
      if(primary.currentZoning)                     stateUpdate.currentZoning = primary.currentZoning;
    }
    this._state = { ...this._state, ...stateUpdate, isDirty: true };
    this._recomputeTotals();
    this._notify();
    this._scheduleSave();
  }

  addProperty() {
    const id = this._state.nextPropId;
    this.set({
      properties: [...this._state.properties, makeNewProperty(id)],
      nextPropId: id + 1,
    });
  }

  removeProperty(id) {
    if(this._state.properties.length <= 1) return;
    this.set({ properties: this._state.properties.filter(p => p.id !== id) });
  }

  navigate(sheetId) {
    this._state = { ...this._state, currentSheet: sheetId };
    this._notify();
    // Scroll content to top
    requestAnimationFrame(() => {
      const el = document.getElementById('sheet-content');
      if(el) el.scrollTo({ top: 0, behavior: 'smooth' });
    });
  }

  // Recompute soft/muni totals whenever items change
  _recomputeTotals() {
    const softTotal = this._state.softItems
      .reduce((s, i) => s + U.p(i.amount), 0);
    const muniTotal = this._state.muniItems
      .reduce((s, i) => s + U.p(i.amount), 0);
    this._state.softTotal = String(softTotal);
    this._state.muniTotal = String(muniTotal);
  }

  subscribe(fn) {
    this._listeners.push(fn);
    return () => { this._listeners = this._listeners.filter(l => l !== fn); };
  }

  _notify() {
    this._listeners.forEach(fn => fn(this._state));
  }

  _scheduleSave() {
    clearTimeout(this._saveTimer);
    this._saveTimer = setTimeout(() => this._save(), 800);
  }

  _save() {
    try {
      const snapshot = {
        version: STORAGE_VERSION,
        savedAt: new Date().toISOString(),
        state: this._state,
      };
      localStorage.setItem(STORAGE_KEY, JSON.stringify(snapshot));
    } catch(e) {
      // Storage quota exceeded or unavailable — continue silently
      console.warn('[ProformaApp] Auto-save failed:', e.message);
    }
  }

  _restore() {
    try {
      const raw = localStorage.getItem(STORAGE_KEY);
      if(!raw) return;
      const snapshot = JSON.parse(raw);
      if(snapshot.version !== STORAGE_VERSION) {
        localStorage.removeItem(STORAGE_KEY);
        return;
      }
      // Merge saved state — preserve defaults for any new keys added since save
      this._state = { ...makeInitialState(), ...snapshot.state };
    } catch(e) {
      console.warn('[ProformaApp] Session restore failed:', e.message);
      localStorage.removeItem(STORAGE_KEY);
    }
  }

  reset() {
    localStorage.removeItem(STORAGE_KEY);
    this._state = makeInitialState();
    this._notify();
  }
}

// ── PART 4: COMPONENT HELPERS ─────────────────────────────────────

// Toast system — singleton
let _toastTimer = null;
function showToast(msg, isErr=false) {
  const existing = document.getElementById('app-toast');
  if(existing) existing.remove();
  const el = document.createElement('div');
  el.id = 'app-toast';
  el.className = 'toast' + (isErr?' err':'');
  el.textContent = msg;
  document.body.appendChild(el);
  clearTimeout(_toastTimer);
  _toastTimer = setTimeout(() => el.remove(), 3500);
}

// ── NUM INPUT — formatted display with commas ─────────────────────
// Returns an <input> element that shows commas when not focused
// but allows clean editing when focused. Strips non-numeric input.
function numInput(value, onChange, placeholder, extraClass='') {
  const container = document.createElement('div');
  container.style.position = 'relative';

  const inp = document.createElement('input');
  inp.type = 'text';
  inp.className = 'inp' + (extraClass?' '+extraClass:'');
  inp.placeholder = placeholder || '';
  inp.inputMode = 'numeric';

  // Display formatted when not editing
  const raw = String(value||'').replace(/,/g,'');
  const num = parseFloat(raw);
  inp.value = (!isNaN(num) && raw!=='') ? num.toLocaleString('en-CA') : raw;

  inp.addEventListener('focus', () => {
    // Show raw value for editing
    inp.value = String(value||'').replace(/,/g,'');
  });

  inp.addEventListener('input', () => {
    // Only allow digits and single decimal point
    const cleaned = inp.value.replace(/[^0-9.]/g,'');
    if(inp.value !== cleaned) inp.value = cleaned;
    onChange(cleaned);
  });

  inp.addEventListener('blur', () => {
    // Reformat with commas on blur
    const n = parseFloat(inp.value);
    if(!isNaN(n) && inp.value!=='') {
      inp.value = n.toLocaleString('en-CA');
    }
  });

  container.appendChild(inp);
  return container;
}

// ── FIELD BUILDER ─────────────────────────────────────────────────
// Builds a complete field: label + input + hint/error
// Returns a div element
function field({
  label, value='', onChange, placeholder='', type='text',
  required=false, optional=false,
  aiMeta=null,   // {source, ts, confidence} — makes label show AI badge
  hint='', error='',
  isNum=false,   // use numInput component
  options=null,  // if set, renders <select>
  disabled=false,
  extraClass='',
}) {
  const wrap = document.createElement('div');
  wrap.className = 'field';

  // Label row
  const labelRow = document.createElement('div');
  labelRow.className = 'field-label';
  labelRow.appendChild(document.createTextNode(label));

  if(required) {
    const star = document.createElement('span');
    star.className = 'req-star';
    star.textContent = '★';
    labelRow.appendChild(star);
  }
  if(optional) {
    const opt = document.createElement('span');
    opt.className = 'opt-badge';
    opt.textContent = 'optional';
    labelRow.appendChild(opt);
  }

  // Interactive AI badge
  if(aiMeta) {
    const badge = document.createElement('span');
    badge.className = 'ai-badge';
    badge.innerHTML = 'AI ▾';
    badge.setAttribute('title', 'Click to see data source');

    const popup = document.createElement('div');
    popup.className = 'ai-popup';
    popup.style.display = 'none';

    const confColor = aiMeta.confidence==='high' ? '#2a7a2a'
                    : aiMeta.confidence==='medium' ? '#8a5c00' : '#888';
    const confLabel = aiMeta.confidence==='high'   ? 'High — authoritative'
                    : aiMeta.confidence==='medium'  ? 'Medium — estimated'
                    : 'Verify manually';

    popup.innerHTML = `
      <button class="ai-popup-close">×</button>
      <div class="ai-popup-row"><span class="ai-popup-label">Source</span><span class="ai-popup-val">${aiMeta.source||'Verified source'}</span></div>
      ${aiMeta.ts?`<div class="ai-popup-row"><span class="ai-popup-label">Retrieved</span><span class="ai-popup-val">${aiMeta.ts}</span></div>`:''}
      <div class="ai-popup-row"><span class="ai-popup-label">Confidence</span><span class="ai-popup-val" style="color:${confColor}">${confLabel}</span></div>
      <div style="font-size:10px;color:#888;padding-top:6px;border-top:1px solid #f0f0f0;margin-top:4px;">Agent override takes precedence · Changes tracked</div>
    `;

    popup.querySelector('.ai-popup-close').onclick = e => {
      e.stopPropagation();
      popup.style.display = 'none';
    };

    badge.onclick = e => {
      e.stopPropagation();
      popup.style.display = popup.style.display==='none' ? 'block' : 'none';
    };

    // Close popup on outside click
    document.addEventListener('click', () => { popup.style.display = 'none'; }, {once:false});

    badge.appendChild(popup);
    labelRow.appendChild(badge);
  }

  wrap.appendChild(labelRow);

  // Input element
  let inp;
  if(options) {
    // Select dropdown
    inp = document.createElement('select');
    inp.className = 'inp' + (extraClass?' '+extraClass:'');
    if(disabled) inp.disabled = true;
    options.forEach(opt => {
      const o = document.createElement('option');
      o.value = typeof opt==='object' ? opt.value : opt;
      o.textContent = typeof opt==='object' ? opt.label : opt;
      o.selected = (o.value===value||o.textContent===value);
      inp.appendChild(o);
    });
    inp.addEventListener('change', () => onChange(inp.value));
    wrap.appendChild(inp);
  } else if(isNum) {
    const numWrap = numInput(value, onChange, placeholder, aiMeta?'ai'+' '+extraClass:extraClass);
    if(disabled) numWrap.querySelector('input').disabled = true;
    wrap.appendChild(numWrap);
  } else {
    inp = document.createElement('input');
    inp.type = type;
    inp.className = 'inp' + (aiMeta?' ai':'') + (extraClass?' '+extraClass:'') + (error?' error':'');
    inp.value = value;
    inp.placeholder = placeholder;
    if(disabled) inp.disabled = true;
    inp.addEventListener('input', () => onChange(inp.value));
    wrap.appendChild(inp);
  }

  if(hint) {
    const h = document.createElement('div');
    h.className = 'field-hint';
    h.textContent = hint;
    wrap.appendChild(h);
  }
  if(error) {
    const e = document.createElement('div');
    e.className = 'field-error';
    e.textContent = error;
    wrap.appendChild(e);
  }

  return wrap;
}

// ── GRID WRAPPER ─────────────────────────────────────────────────
function grid(className, ...children) {
  const div = document.createElement('div');
  div.className = className;
  children.forEach(c => c && div.appendChild(c));
  return div;
}

// ── KPI STRIP ─────────────────────────────────────────────────────
function kpiStrip(items) {
  const strip = document.createElement('div');
  strip.className = 'kpi-strip';
  items.forEach(({label, value, highlight, sub}) => {
    const cell = document.createElement('div');
    cell.className = 'kpi-cell' + (highlight?' hl':'');
    cell.innerHTML = `
      <div class="kpi-num">${value}</div>
      <div class="kpi-lbl">${label}</div>
      ${sub?`<div class="kpi-sub">${sub}</div>`:''}
    `;
    strip.appendChild(cell);
  });
  return strip;
}

// ── DSCR INDICATOR ────────────────────────────────────────────────
function dscrIndicator(dscr) {
  const cls  = dscr>=1.1?'ok':dscr>=0.95?'warn':'bad';
  const col  = dscr>=1.1?'#2a7a2a':dscr>=0.95?'#8a5c00':'#c00';
  const msg  = dscr>=1.1 ? `✓ DSCR ${U.x(dscr)} — CMHC Compliant`
             : dscr>0    ? `⚠ DSCR ${U.x(dscr)} — Below 1.10x minimum`
             : 'Enter revenue and financing inputs to calculate DSCR';
  const pct  = U.clamp((dscr/1.5)*100, 0, 100);
  const wrap = document.createElement('div');
  wrap.className = 'dscr-wrap';
  wrap.innerHTML = `
    <div class="dscr-status ${cls}">
      <div class="dscr-dot" style="background:${col}"></div>
      ${msg}
    </div>
    <div class="dscr-track">
      <div class="dscr-fill" style="width:${pct}%;background:${col}"></div>
    </div>
  `;
  return wrap;
}

// ── CARD BUILDER ──────────────────────────────────────────────────
function card(title, bodyFn, opts={}) {
  const div = document.createElement('div');
  div.className = 'card';
  if(title) {
    const hdr = document.createElement('div');
    hdr.className = 'card-hdr';
    const t = document.createElement('div');
    t.className = 'card-hdr-title';
    t.textContent = title;
    hdr.appendChild(t);
    if(opts.headerRight) hdr.appendChild(opts.headerRight);
    div.appendChild(hdr);
  }
  const body = document.createElement('div');
  body.className = 'card-body';
  bodyFn(body);
  div.appendChild(body);
  return div;
}

// ── SECTION BLOCK ─────────────────────────────────────────────────
function sectionBlock(title, ...children) {
  const div = document.createElement('div');
  div.className = 'section-block';
  if(title) {
    const t = document.createElement('div');
    t.className = 'section-title';
    t.textContent = title;
    div.appendChild(t);
  }
  children.forEach(c => c && div.appendChild(c));
  return div;
}

// ── EDITABLE LINE ITEMS TABLE ──────────────────────────────────────
// items: [{id, label, amount}]
// onChange: (newItems) => void
function lineItemsTable(items, onChange, showBPSF=false, gfa=0) {
  const wrap = document.createElement('div');

  function rebuild() {
    wrap.innerHTML = '';
    const total = items.reduce((s,i)=>s+U.p(i.amount),0);

    const table = document.createElement('table');
    table.className = 'li-table';

    // Header
    const thead = document.createElement('thead');
    const hr = document.createElement('tr');
    const ths = ['Item', 'Amount ($)'];
    if(showBPSF && gfa>0) ths.push('$/SF GFA');
    ths.push('');
    ths.forEach((h,i) => {
      const th = document.createElement('th');
      th.className = i>0?'r':'';
      th.textContent = h;
      hr.appendChild(th);
    });
    thead.appendChild(hr);
    table.appendChild(thead);

    const tbody = document.createElement('tbody');

    items.forEach((item, idx) => {
      const tr = document.createElement('tr');

      // Label cell
      const tdLabel = document.createElement('td');
      const liLabel = document.createElement('input');
      liLabel.className = 'li-inp-label';
      liLabel.value = item.label;
      liLabel.placeholder = 'Line item description';
      liLabel.oninput = () => {
        items[idx].label = liLabel.value;
        onChange([...items]);
      };
      tdLabel.appendChild(liLabel);
      tr.appendChild(tdLabel);

      // Amount cell
      const tdAmt = document.createElement('td');
      tdAmt.className = 'r';
      const liAmt = document.createElement('input');
      liAmt.className = 'li-inp';
      liAmt.inputMode = 'numeric';
      const rawAmt = String(item.amount||'');
      const numAmt = parseFloat(rawAmt);
      liAmt.value = (!isNaN(numAmt)&&rawAmt!=='') ? numAmt.toLocaleString('en-CA') : rawAmt;
      liAmt.addEventListener('focus', () => {
        liAmt.value = String(item.amount||'').replace(/,/g,'');
      });
      liAmt.addEventListener('input', () => {
        const cleaned = liAmt.value.replace(/[^0-9.]/g,'');
        if(liAmt.value!==cleaned) liAmt.value=cleaned;
        items[idx].amount = cleaned;
        onChange([...items]);
      });
      liAmt.addEventListener('blur', () => {
        const n = parseFloat(liAmt.value);
        if(!isNaN(n)) liAmt.value = n.toLocaleString('en-CA');
        rebuild(); // refresh totals
      });
      tdAmt.appendChild(liAmt);
      tr.appendChild(tdAmt);

      // $/SF cell
      if(showBPSF && gfa>0) {
        const tdPSF = document.createElement('td');
        tdPSF.className = 'r';
        const amt = U.p(item.amount);
        tdPSF.textContent = amt>0 ? '$'+(amt/gfa).toFixed(2) : '—';
        tr.appendChild(tdPSF);
      }

      // Remove button
      const tdDel = document.createElement('td');
      const delBtn = document.createElement('button');
      delBtn.className = 'btn-icon';
      delBtn.textContent = '✕';
      delBtn.title = 'Remove line';
      delBtn.onclick = () => {
        items.splice(idx,1);
        onChange([...items]);
        rebuild();
      };
      tdDel.appendChild(delBtn);
      tr.appendChild(tdDel);

      tbody.appendChild(tr);
    });

    // Total row
    const totalRow = document.createElement('tr');
    totalRow.className = 'total';
    const tdTotalLabel = document.createElement('td');
    tdTotalLabel.textContent = 'TOTAL';
    totalRow.appendChild(tdTotalLabel);
    const tdTotalAmt = document.createElement('td');
    tdTotalAmt.className = 'r';
    tdTotalAmt.textContent = U.$(total);
    totalRow.appendChild(tdTotalAmt);
    if(showBPSF && gfa>0) {
      const tdTotalPSF = document.createElement('td');
      tdTotalPSF.className = 'r';
      tdTotalPSF.textContent = total>0?'$'+(total/gfa).toFixed(2)+'/SF':'—';
      totalRow.appendChild(tdTotalPSF);
    }
    const tdTotalDel = document.createElement('td');
    totalRow.appendChild(tdTotalDel);
    tbody.appendChild(totalRow);

    table.appendChild(tbody);
    wrap.appendChild(table);

    // Add row button
    const addBtn = document.createElement('button');
    addBtn.className = 'btn btn-ghost btn-sm';
    addBtn.textContent = '+ Add row';
    addBtn.style.marginTop = '8px';
    addBtn.onclick = () => {
      const newId = 'x'+Date.now();
      items.push({id:newId, label:'', amount:''});
      onChange([...items]);
      rebuild();
    };
    wrap.appendChild(addBtn);
  }

  rebuild();
  return wrap;
}

// ── NAV BUTTON ROW ────────────────────────────────────────────────
function navRow(onBack, onNext, nextLabel='Continue →', backLabel='← Back', requiredFields=[]) {
  const row = document.createElement('div');
  row.className = 'no-print';
  row.style.cssText = 'display:flex;gap:10px;margin-top:20px;';

  if(onBack) {
    const back = document.createElement('button');
    back.className = 'btn btn-secondary';
    back.textContent = backLabel;
    back.onclick = onBack;
    row.appendChild(back);
  }

  const next = document.createElement('button');
  next.className = 'btn btn-primary';
  next.style.flex = '1';
  next.textContent = nextLabel;
  next.onclick = () => {
    if(onNext) {
      // Check required fields before navigating forward
      if(requiredFields.length > 0) {
        const s = Store.get();
        const missing = requiredFields.filter(f => !s[f.key] || String(s[f.key]).trim() === '');
        if(missing.length > 0) {
          showToast('⚠ Please fill in: ' + missing.map(f => f.label).join(', '), true);
          return;
        }
      }
      onNext();
    }
  };
  row.appendChild(next);

  return row;
}

// ── FIND IT COMPONENT ────────────────────────────────────────────
function renderFindIt(prop) {
  // State is held in DOM data attributes to survive re-renders

  let searchMode = prop._findItMode || 'address';
  let confirmed  = prop.verified;
  let abortController = null;
  let pidInput   = prop.pid || '';

  function set(key) { return v => Store.setProp(prop.id, {[key]:v}); }

  function render() {
    container.innerHTML = '';

    // Search mode toggle
    const toggle = document.createElement('div');
    toggle.style.marginBottom = '12px';
    const toggleLabel = document.createElement('div');
    toggleLabel.className = 'field-label';
    toggleLabel.style.marginBottom = '8px';
    toggleLabel.textContent = 'Search by Address or PID';
    toggle.appendChild(toggleLabel);

    const toggleBtns = document.createElement('div');
    toggleBtns.className = 'search-mode-toggle';
    ['address','pid'].forEach(mode => {
      const btn = document.createElement('button');
      btn.className = 'smt-btn' + (searchMode===mode?' active':'');
      btn.textContent = mode==='address' ? 'Address' : 'PID';
      btn.onclick = () => {
        searchMode = mode;
        Store.setProp(prop.id, {_findItMode:mode});
        render();
      };
      toggleBtns.appendChild(btn);
    });
    toggle.appendChild(toggleBtns);
    container.appendChild(toggle);

    // Confirmed state — show after successful lookup
    if(confirmed && prop.address) {
      const ts = prop._sources?.address?.ts || prop._sources?.pid?.ts || '';
      const source = prop._sources?.pid?.source || prop._sources?.address?.source || 'Verified';

      const confDiv = document.createElement('div');
      confDiv.className = 'fi-confirmed';
      confDiv.innerHTML = `
        <div class="fi-verified-lbl">✓ Verified · ${source}</div>
        <div class="fi-addr-main">${prop.address}</div>
        <div class="fi-addr-sub">${[prop.city,prop.province].filter(Boolean).join(', ')}</div>
        ${ts?`<div class="fi-ts">Retrieved: ${ts}</div>`:''}
      `;

      // Change button
      const changeBtn = document.createElement('button');
      changeBtn.style.cssText = 'background:none;border:none;font-size:11px;color:#555;cursor:pointer;text-decoration:underline;font-family:inherit;margin-top:6px;padding:0;';
      changeBtn.textContent = 'Change address';
      changeBtn.onclick = () => {
        confirmed = false;
        Store.setProp(prop.id, {verified:false, address:'', city:'', province:''});
        render();
      };
      confDiv.appendChild(changeBtn);

      // Source status
      const srcTable = document.createElement('div');
      srcTable.className = 'source-table';
      [
        ['OpenStreetMap',    'Address · Zoning type',          !!prop.address],
        ['BC Assessment',    'PID · Legal · Tax · Assessment',  !!prop.pid && !!prop.legal],
        ['Land Title Office','Legal description',               !!prop.legal],
        ['GeoBC',           'Frontage · Depth · Site size',    !!prop.frontage],
      ].forEach(([name, info, done]) => {
        const row = document.createElement('div');
        row.className = 'source-row';
        row.innerHTML = `<span class="source-name">${name}</span><span class="source-val ${done?'done':'pending'}">${done?'✓ '+info:'Pending'}</span>`;
        srcTable.appendChild(row);
      });
      confDiv.appendChild(srcTable);

      // PID load row (always shown in confirmed state)
      const pidRow = document.createElement('div');
      pidRow.className = 'pid-load-row';
      const pidInp = document.createElement('input');
      pidInp.className = 'pid-load-inp';
      pidInp.value = pidInput;
      pidInp.placeholder = 'Enter PID to load full BC Assessment data (e.g. 032-110-791)';
      pidInp.oninput = () => { pidInput = pidInp.value; };
      pidInp.onkeydown = e => { if(e.key==='Enter') doLookupPID(); };
      const loadBtn = document.createElement('button');
      loadBtn.className = 'btn btn-primary btn-sm';
      loadBtn.textContent = 'Load Data';
      loadBtn.onclick = doLookupPID;
      pidRow.appendChild(pidInp);
      pidRow.appendChild(loadBtn);
      confDiv.appendChild(pidRow);

      container.appendChild(confDiv);
      return;
    }

    // ── ADDRESS MODE ─────────────────────────────────────────────
    if(searchMode==='address') {
      const searchWrap = document.createElement('div');
      searchWrap.style.position = 'relative';

      const inp = document.createElement('input');
      inp.className = 'inp';
      inp.placeholder = 'Start typing an address, city or postcode...';
      inp.autocomplete = 'off';
      searchWrap.appendChild(inp);

      // Results dropdown
      const dropdown = document.createElement('div');
      dropdown.className = 'fi-dropdown';
      dropdown.style.display = 'none';
      searchWrap.appendChild(dropdown);

      let debTimer;
      inp.addEventListener('input', () => {
        const q = inp.value.trim();
        if(!q || q.length<3) { dropdown.style.display='none'; return; }
        dropdown.style.display = 'block';
        dropdown.innerHTML = '<div style="padding:12px 14px;font-size:12px;color:#888">Searching...</div>';

        clearTimeout(debTimer);
        if(abortController) abortController.abort();
        const controller = new AbortController();
        abortController = controller;

        debTimer = setTimeout(async () => {
          try {
            const r = await fetch(
              `https://photon.komoot.io/api/?q=${encodeURIComponent(q)}&limit=7&lang=en`,
              {headers:{Accept:'application/json'}, signal:controller.signal}
            );
            if(!r.ok) throw new Error('API error');
            const data = await r.json();
            if(controller.signal.aborted) return;

            dropdown.innerHTML = '';
            const features = data.features || [];

            features.forEach(f => {
              const p = f.properties;
              const coords = f.geometry?.coordinates || [];
              const country = (p.countrycode||'DEFAULT').toUpperCase();
              const num    = p.housenumber||'';
              const street = p.street||p.road||'';
              const city   = p.city||p.town||p.village||p.municipality||'';
              const state  = p.state||p.province||'';
              const pc     = p.postcode||'';
              const line1  = [num,street].filter(Boolean).join(' ')||p.name||city;
              const line2  = [city!==line1?city:'',state,(p.country||''),pc].filter(Boolean).join(', ');
              const src    = SOURCE_MAP[country]||SOURCE_MAP.DEFAULT;
              const resTs  = new Date().toLocaleString('en-CA');

              const item = document.createElement('div');
              item.className = 'fi-result';
              item.innerHTML = `
                <div class="fi-addr">${line1}</div>
                <div class="fi-meta">${line2}</div>
                <div class="fi-badges">
                  <span class="fi-badge-ok">✓ ${src.name}</span>
                  <span class="fi-badge-src">${src.sources[0]||''}</span>
                </div>
              `;
              item.onclick = () => {
                confirmed = true;
                dropdown.style.display = 'none';
                Store.setProp(prop.id, {
                  address:line1, city, province:state,
                  addrStatus:'confirmed', verified:true,
                  _sources:{
                    ...prop._sources,
                    address:{source:'OpenStreetMap',ts:resTs,confidence:'high'},
                  },
                  _findItMode:searchMode,
                });
                renderApp();
                showToast('✓ Address verified via OpenStreetMap · Enter PID to load full property data');
              };
              dropdown.appendChild(item);
            });

            // Manual entry option
            const manual = document.createElement('div');
            manual.className = 'fi-result';
            manual.innerHTML = '<div class="fi-addr">✏️ Not listed — enter manually</div><div class="fi-meta">New development or pending municipal address</div>';
            manual.onclick = () => {
              dropdown.style.display = 'none';
              Store.setProp(prop.id, {addrStatus:'manual', _findItMode:searchMode});
              renderApp();
            };
            dropdown.appendChild(manual);

            if(features.length===0) {
              dropdown.innerHTML = `
                <div style="padding:10px 14px;font-size:12px;color:#888">No results for "${q}"</div>
              `;
              dropdown.appendChild(manual);
            }

          } catch(e) {
            if(e.name==='AbortError') return;
            dropdown.innerHTML = '<div style="padding:10px 14px;font-size:12px;color:#c00">Search failed — check connection</div>';
          }
        }, 320);
      });

      inp.addEventListener('keydown', e => {
        if(e.key==='Enter') {
          const first = dropdown.querySelector('.fi-result');
          if(first) first.click();
        }
        if(e.key==='Escape') dropdown.style.display='none';
      });

      // Close dropdown on outside click
      document.addEventListener('mousedown', e => {
        if(!searchWrap.contains(e.target)) dropdown.style.display='none';
      });

      const manualLink = document.createElement('button');
      manualLink.style.cssText = 'background:none;border:none;font-size:11px;color:#555;cursor:pointer;text-decoration:underline;font-family:inherit;margin-top:6px;padding:0;display:block;';
      manualLink.textContent = 'No address yet — enter manually (new development or assembly)';
      manualLink.onclick = () => {
        Store.setProp(prop.id, {addrStatus:'manual'});
        renderApp();
      };

      container.appendChild(searchWrap);
      container.appendChild(manualLink);
    }

    // ── PID MODE ─────────────────────────────────────────────────
    if(searchMode==='pid') {
      const pidRow = document.createElement('div');
      pidRow.className = 'pid-load-row';
      const pidInp = document.createElement('input');
      pidInp.className = 'inp';
      pidInp.value = pidInput;
      pidInp.placeholder = 'Enter PID (e.g. 032-110-791 or 010-075-909)';
      pidInp.autocomplete = 'off';
      pidInp.oninput = () => { pidInput = pidInp.value; };
      pidInp.onkeydown = e => { if(e.key==='Enter') doLookupPID(); };
      const searchBtn = document.createElement('button');
      searchBtn.className = 'btn btn-primary';
      searchBtn.textContent = 'Search PID';
      searchBtn.onclick = doLookupPID;
      pidRow.appendChild(pidInp);
      pidRow.appendChild(searchBtn);
      container.appendChild(pidRow);

      const hint = document.createElement('div');
      hint.className = 'field-hint';
      hint.style.marginTop = '6px';
      hint.textContent = 'Searches BC Assessment, Land Title Office, GeoBC — auto-populates all available fields';
      container.appendChild(hint);
    }
  }

  async function doLookupPID() {
    const rawPID = pidInput.trim();
    if(!rawPID) { showToast('Enter a PID first',true); return; }

    // Sanitise — only digits and hyphens
    const sanitised = rawPID.replace(/[^0-9\-]/g,'');
    if(sanitised.replace(/-/g,'').length < 9) {
      showToast('PID must be 9 digits (e.g. 032-110-791)',true);
      return;
    }
    // Normalise to XXX-XXX-XXX
    const digits = sanitised.replace(/-/g,'');
    const normalised = digits.length===9
      ? `${digits.slice(0,3)}-${digits.slice(3,6)}-${digits.slice(6,9)}`
      : sanitised;

    showToast('Loading property data...');

    // Simulate BC Assessment API (replace with real API call)
    await new Promise(r=>setTimeout(r,700));
    const data = PID_REGISTRY[normalised] || PID_REGISTRY[sanitised] || PID_REGISTRY[rawPID];
    const resTs = new Date().toLocaleString('en-CA');

    if(data) {
      const sources = {};
      ['pid','legal','currentZoning','siteSF','frontage','depth','structure','yearBuilt','shape',
       'bldgSF','taxYear','annualTax','assessBldg','assessLand','assessTotal','lastYearAssessTotal'].forEach(k => {
        if(data[k]) sources[k] = {source: data.source||'BC Assessment', ts:resTs, confidence:'high'};
      });
      sources.address = {source:'BC Assessment', ts:resTs, confidence:'high'};

      confirmed = true;
      Store.setProp(prop.id, {
        ...data,
        verified:true,
        addrStatus:'confirmed',
        _sources:{...prop._sources, ...sources},
        _findItMode:searchMode,
      });
      renderApp();
      showToast(`✓ Property data loaded · PID ${normalised} · ${data.source}`);
    } else {
      showToast(`PID ${normalised} not found — enter fields manually`,true);
    }
  }

  render();
  return container;
}

// AI Hard Cost Estimate helper
async function getHardCostEstimate(s, btn) {
  const gfa = U.p(s.gfa);
  if(!gfa) { showToast('Enter GFA first to estimate hard costs',true); return; }

  btn.disabled = true;
  btn.textContent = 'Estimating...';

  const projType = s.projType || 'Mid Rise';
  const storeys  = U.p(s.storeys, 6);

  if(s.apiKey && s.apiKey.startsWith('sk-ant')) {
    try {
      const r = await fetch('https://api.anthropic.com/v1/messages', {
        method:'POST',
        headers:{
          'Content-Type':'application/json',
          'x-api-key':s.apiKey,
          'anthropic-version':'2023-06-01',
          'anthropic-dangerous-direct-browser-access':'true'
        },
        body:JSON.stringify({
          model:'claude-sonnet-4-20250514', max_tokens:200,
          messages:[{role:'user',content:`Canadian real estate development cost consultant, Metro Vancouver 2025-2026.
Project: ${projType}, ${gfa.toLocaleString()} SF GFA, ${storeys} storeys.
Provide hard construction cost estimate (all-in $/SF GFA, wood frame or concrete as appropriate).
Respond ONLY with JSON: {"totalEstimate":<number>,"perSF":<number>,"rationale":"<2 sentences>"}`}]
        })
      });
      if(!r.ok) throw new Error('API error');
      const data = await r.json();
      const parsed = JSON.parse(data.content[0].text.replace(/```json|```/g,'').trim());
      Store.set({hardPSF:String(Math.round(parsed.perSF))});
      showToast(`✓ AI estimate: $${parsed.perSF}/SF GFA — ${parsed.rationale}`);
    } catch(e) {
      applyFormulaEstimate(projType, gfa);
    }
  } else {
    applyFormulaEstimate(projType, gfa);
  }
  btn.disabled = false;
  btn.textContent = 'Get AI Estimate';
  renderApp();
}

function applyFormulaEstimate(projType, gfa) {
  const rate = projType.includes('High') ? 360
    : projType.includes('Mid')           ? 315
    : projType.includes('Low')           ? 285
    : projType.includes('Town')          ? 260
    : projType.includes('Multi')         ? 220 : 290;
  Store.set({hardPSF:String(rate)});
  showToast(`✓ Formula estimate: $${rate}/SF GFA based on ${projType} benchmarks · Add Claude API key for AI estimate`);
}

// ── SHEET 9: COMPARABLE SALES ─────────────────────────────────────
function renderSheet_comps(s) {
  const wrap = document.createElement('div');
  wrap.className = 'sheet-inner wide';
  wrap.innerHTML = '<div class="sheet-hdr"><h1>Comparable Sales</h1><p>Enter land comparable sales to support your land valuation. Calculate $/BPSF automatically from sale price and site area.</p></div>';

  const fsr = U.p(s.fsr, 2.0);

  wrap.appendChild(card('Land Comparables', body => {
    const table = document.createElement('table');
    table.className = 'comp-table';
    table.innerHTML = `
      <thead>
        <tr>
          <th style="min-width:200px">Address</th>
          <th style="min-width:90px">Sale Date</th>
          <th style="min-width:100px">Site SF</th>
          <th style="min-width:90px">Zoning</th>
          <th style="min-width:120px">Sale Price ($)</th>
          <th style="min-width:90px">$/SF Site</th>
          <th style="min-width:90px">$/BPSF</th>
          <th style="min-width:150px">Notes</th>
          <th style="width:32px"></th>
        </tr>
      </thead>
    `;
    const tbody = document.createElement('tbody');

    function renderRows() {
      tbody.innerHTML = '';
      s.comps.forEach((comp, idx) => {
        const tr = document.createElement('tr');
        const siteNum   = U.p(comp.siteSF);
        const priceNum  = U.p(comp.salePrice);
        const psfSite   = siteNum>0&&priceNum>0 ? priceNum/siteNum : 0;
        const bpsf      = fsr>0&&siteNum>0&&priceNum>0 ? priceNum/(siteNum*fsr) : 0;

        function compInp(key, ph, isNum=false) {
          const td = document.createElement('td');
          const inp = document.createElement('input');
          inp.className = 'comp-inp';
          if(isNum) {
            inp.inputMode = 'numeric';
            const n = parseFloat(String(comp[key]||'').replace(/,/g,''));
            inp.value = (!isNaN(n)&&comp[key]!=='') ? n.toLocaleString('en-CA') : comp[key]||'';
            inp.addEventListener('focus', ()=>{ inp.value=String(comp[key]||'').replace(/,/g,''); });
            inp.addEventListener('blur',  ()=>{
              const nv=parseFloat(inp.value); if(!isNaN(nv))inp.value=nv.toLocaleString('en-CA');
              renderRows();
            });
          } else {
            inp.value = comp[key]||'';
          }
          inp.placeholder = ph;
          inp.oninput = () => {
            const newComps = [...s.comps];
            const cleaned = isNum ? inp.value.replace(/[^0-9.]/g,'') : inp.value;
            newComps[idx] = {...newComps[idx],[key]:cleaned};
            Store.set({comps:newComps});
          };
          td.appendChild(inp);
          return td;
        }

        tr.appendChild(compInp('address','e.g. 809 W 41st Ave'));
        tr.appendChild(compInp('date','YYYY-MM'));
        tr.appendChild(compInp('siteSF','SF',true));
        tr.appendChild(compInp('zoning','e.g. RM-3'));
        tr.appendChild(compInp('salePrice','$',true));

        const tdPSF = document.createElement('td');
        tdPSF.className = 'comp-calc';
        tdPSF.textContent = psfSite>0 ? '$'+psfSite.toFixed(0) : '—';
        tr.appendChild(tdPSF);

        const tdBPSF = document.createElement('td');
        tdBPSF.className = 'comp-calc';
        tdBPSF.style.fontWeight = '700';
        tdBPSF.textContent = bpsf>0 ? '$'+bpsf.toFixed(0) : '—';
        tr.appendChild(tdBPSF);

        tr.appendChild(compInp('notes','Notes'));

        const tdDel = document.createElement('td');
        const delBtn = document.createElement('button');
        delBtn.className = 'btn-icon';
        delBtn.textContent = '✕';
        delBtn.onclick = () => {
          const newComps = s.comps.filter((_,i)=>i!==idx);
          Store.set({comps:newComps});
          renderRows();
        };
        tdDel.appendChild(delBtn);
        tr.appendChild(tdDel);
        tbody.appendChild(tr);
      });
    }

    renderRows();
    table.appendChild(tbody);
    body.appendChild(table);

    const addBtn = document.createElement('button');
    addBtn.className = 'btn btn-ghost btn-sm';
    addBtn.style.marginTop = '10px';
    addBtn.textContent = '+ Add comparable';
    addBtn.onclick = () => {
      Store.set({comps:[...s.comps,{id:'c'+Date.now(),address:'',date:'',siteSF:'',salePrice:'',zoning:'',notes:''}]});
      renderRows();
    };
    body.appendChild(addBtn);

    if(fsr > 0) {
      const hint = document.createElement('div');
      hint.className = 'field-hint';
      hint.style.marginTop = '8px';
      hint.textContent = `$/BPSF calculated using FSR ${fsr} from Development Potential. Update FSR there to recalculate.`;
      body.appendChild(hint);
    }
  }));

  // Subject property comparison
  const landAsk = U.p(s.land);
  const siteSF  = U.p(s.siteSF);
  const psfSubj = siteSF>0&&landAsk>0 ? landAsk/siteSF : 0;
  const bpsfSubj= fsr>0&&siteSF>0&&landAsk>0 ? landAsk/(siteSF*fsr) : 0;

  if(landAsk > 0) {
    wrap.appendChild(card('Subject Property', body => {
      const table = document.createElement('table');
      table.className = 'li-table';
      table.innerHTML = `
        <tbody>
          <tr><td>Address</td><td class="r">${s.properties[0]?.address||'—'}</td></tr>
          <tr><td>Site Size</td><td class="r">${U.n(siteSF)} SF</td></tr>
          <tr><td>FSR</td><td class="r">${fsr}</td></tr>
          <tr><td>Land Asking Price</td><td class="r">${U.$(landAsk)}</td></tr>
          <tr><td>$/SF Site Area</td><td class="r">${psfSubj>0?'$'+psfSubj.toFixed(0):'—'}</td></tr>
          <tr class="total"><td>$/BPSF</td><td class="r">${bpsfSubj>0?'$'+bpsfSubj.toFixed(0):'—'}</td></tr>
        </tbody>
      `;
      body.appendChild(table);
    }));
  }

  wrap.appendChild(navRow(
    ()=>{Store.navigate('rlv');renderApp();},
    ()=>{Store.navigate('schedule');renderApp();},
    'Continue to Project Schedule →'
  ));
  return wrap;
}

// ── SHEET 10: PROJECT SCHEDULE ────────────────────────────────────
function renderSheet_schedule(s) {
  const wrap = document.createElement('div');
  wrap.className = 'sheet-inner wide';
  wrap.innerHTML = '<div class="sheet-hdr"><h1>Project Schedule</h1><p>Enter key milestone dates and track project phases. Updates flow to the generated proforma.</p></div>';

  const phases = [...new Set(s.schedule.map(t=>t.phase))];

  wrap.appendChild(card('Development Timeline', body => {
    const table = document.createElement('table');
    table.className = 'sched-table';
    table.innerHTML = `
      <thead><tr>
        <th style="min-width:140px">Phase</th>
        <th style="min-width:200px">Task / Milestone</th>
        <th style="min-width:120px">Start Date</th>
        <th style="min-width:120px">Target Date</th>
        <th style="min-width:100px">Status</th>
        <th style="width:32px"></th>
      </tr></thead>
    `;
    const tbody = document.createElement('tbody');

    phases.forEach(phase => {
      const tasks = s.schedule.filter(t=>t.phase===phase);

      // Phase header row
      const phaseRow = document.createElement('tr');
      phaseRow.style.background = '#f4f4f4';
      const phaseCell = document.createElement('td');
      phaseCell.colSpan = 6;
      phaseCell.className = 'sched-phase';
      phaseCell.style.cssText = 'padding:8px 10px;font-size:11px;font-weight:700;color:#555;text-transform:uppercase;letter-spacing:.06em;';
      phaseCell.textContent = phase;
      phaseRow.appendChild(phaseCell);
      tbody.appendChild(phaseRow);

      tasks.forEach((task, _) => {
        const idx = s.schedule.findIndex(t=>t.id===task.id);
        const tr = document.createElement('tr');

        function schedInp(key, ph) {
          const td = document.createElement('td');
          const inp = document.createElement('input');
          inp.className = 'comp-inp';
          inp.value = task[key]||'';
          inp.placeholder = ph;
          if(key==='start'||key==='end') inp.type='month';
          inp.oninput = () => {
            const newSched = [...s.schedule];
            newSched[idx] = {...newSched[idx],[key]:inp.value};
            Store.set({schedule:newSched});
          };
          td.appendChild(inp);
          return td;
        }

        const tdPhase = document.createElement('td');
        tdPhase.style.fontSize = '11px';
        tdPhase.style.color = '#888';
        tdPhase.textContent = phase;
        tr.appendChild(tdPhase);

        const tdTask = document.createElement('td');
        const taskInp = document.createElement('input');
        taskInp.className = 'comp-inp';
        taskInp.value = task.task||'';
        taskInp.placeholder = 'Milestone description';
        taskInp.oninput = () => {
          const newSched = [...s.schedule];
          newSched[idx] = {...newSched[idx],task:taskInp.value};
          Store.set({schedule:newSched});
        };
        tdTask.appendChild(taskInp);
        tr.appendChild(tdTask);

        tr.appendChild(schedInp('start','YYYY-MM'));
        tr.appendChild(schedInp('end',  'YYYY-MM'));

        const tdStatus = document.createElement('td');
        const statusSel = document.createElement('select');
        statusSel.className = 'comp-inp';
        statusSel.style.cursor = 'pointer';
        ['pending','active','complete'].forEach(st => {
          const opt = document.createElement('option');
          opt.value = st;
          opt.textContent = st.charAt(0).toUpperCase()+st.slice(1);
          opt.selected = task.status===st;
          statusSel.appendChild(opt);
        });
        statusSel.onchange = () => {
          const newSched = [...s.schedule];
          newSched[idx] = {...newSched[idx],status:statusSel.value};
          Store.set({schedule:newSched});
        };
        tdStatus.appendChild(statusSel);
        tr.appendChild(tdStatus);

        const tdDel = document.createElement('td');
        const delBtn = document.createElement('button');
        delBtn.className = 'btn-icon';
        delBtn.textContent = '✕';
        delBtn.onclick = () => {
          Store.set({schedule:s.schedule.filter(t=>t.id!==task.id)});
          renderApp();
        };
        tdDel.appendChild(delBtn);
        tr.appendChild(tdDel);

        tbody.appendChild(tr);
      });
    });

    table.appendChild(tbody);
    body.appendChild(table);

    const addBtn = document.createElement('button');
    addBtn.className = 'btn btn-ghost btn-sm';
    addBtn.style.marginTop = '10px';
    addBtn.textContent = '+ Add milestone';
    addBtn.onclick = () => {
      Store.set({schedule:[...s.schedule,{id:'sc'+Date.now(),phase:'Other',task:'',start:'',end:'',status:'pending'}]});
      renderApp();
    };
    body.appendChild(addBtn);
  }));

  wrap.appendChild(navRow(
    ()=>{Store.navigate('comps');renderApp();},
    ()=>{Store.navigate('generate');renderApp();},
    'Continue to Generate →'
  ));
  return wrap;
}

// ── SHEET 11: GENERATE ────────────────────────────────────────────
function renderSheet_generate(s) {
  const calc = Calc.run(s);
  const wrap = document.createElement('div');
  wrap.className = 'sheet-inner';
  wrap.innerHTML = '<div class="sheet-hdr"><h1>Generate Proforma</h1><p>Select which sections to include in your generated proforma, then download or print.</p></div>';

  orientHdr.style.cssText = 'padding:12px 18px;border-bottom:1px solid #e8e8e8;font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:.06em;'

    orientBody.appendChild(btn)
  })
  orientCard.appendChild(orientHdr)
  orientCard.appendChild(orientBody)
  wrap.appendChild(orientCard)

  // Prepared by
  function setInp(key){ return v => Store.set({[key]:v}); }
  wrap.appendChild(card('Prepared By', body => {
    body.appendChild(grid('g2',
      field({label:'Prepared By',  required:true, value:s.preparedBy, placeholder:'Steven Dong',          onChange:setInp('preparedBy')}),
      field({label:'Brokerage',    required:true, value:s.brokerage,  placeholder:'Multiple Realty Ltd.', onChange:setInp('brokerage')}),
      field({label:'Phone',        optional:true, value:s.phone,      placeholder:'236-999-3333',          onChange:setInp('phone')}),
      field({label:'Website',      optional:true, value:s.website,    placeholder:'www.example.com',       onChange:setInp('website')}),
    ));
  }));

  // Tab selection
  wrap.appendChild(card('Select Tabs to Include', body => {
    const subTitle = document.createElement('div');
    subTitle.style.cssText = 'font-size:11px;text-transform:uppercase;letter-spacing:.06em;color:#888;font-weight:700;margin-bottom:12px;';
    subTitle.textContent = 'Choose which sections appear in the generated proforma';
    body.appendChild(subTitle);

    const grid2 = document.createElement('div');
    grid2.className = 'tabs-grid';

    const TABS_DEF = [
      {key:'cover',        label:'Cover',            sub:'Title & branding',        locked:true},
      {key:'executive',    label:'Executive Summary', sub:'KPIs & overview',         locked:true},
      {key:'propInfo',     label:'Property Info',     sub:'Legal & site details',    locked:false},
      {key:'devPotential', label:'Dev. Potential',    sub:'FSR, units, parking',     locked:false},
      {key:'revenue',      label:'Revenue',           sub:'NOI & income analysis',   locked:false},
      {key:'devCosts',     label:'Dev. Costs',        sub:'Land, hard, soft, muni',  locked:false},
      {key:'financing',    label:'Financing',         sub:'CMHC & loan structure',   locked:false},
      {key:'returns',      label:'Profit & Returns',  sub:'ROI, profit, DSCR',       locked:false},
      {key:'rlv',          label:'Residual Land Value',sub:'RLV analysis',           locked:false},
      {key:'comparables',  label:'Comparable Sales',  sub:'Land comp table',         locked:false},
      {key:'schedule',     label:'Project Schedule',  sub:'Timeline & milestones',   locked:false},
    ];

    TABS_DEF.forEach(({key,label,sub,locked}) => {
      const checked = locked || s.selectedTabs[key];
      const toggle = document.createElement('div');
      toggle.className = 'tab-toggle' + (checked?' checked':'') + (locked?' locked':'');
      toggle.onclick = () => {
        if(locked) return;
        Store.set({selectedTabs:{...s.selectedTabs,[key]:!s.selectedTabs[key]}});
        renderApp();
      };
      toggle.innerHTML = `
        <div class="tab-check">${checked?'✓':''}</div>
        <div>
          <div class="tab-toggle-label">${label}${locked?'<span class="locked-badge">locked</span>':''}</div>
          <div class="tab-toggle-sub">${sub}</div>
        </div>
      `;
      grid2.appendChild(toggle);
    });
    body.appendChild(grid2);
  }));

  // Validation summary
  const validation = Calc.validate(s);
  if(validation.missing.length > 0) {
    const warnCard = document.createElement('div');
    warnCard.style.cssText = 'background:#fff8f0;border:1px solid #f0c080;border-radius:8px;padding:14px 18px;margin-bottom:16px;';
    warnCard.innerHTML = `<div style="font-size:12px;font-weight:700;color:#8a5c00;margin-bottom:8px;text-transform:uppercase;letter-spacing:.04em;">⚠ Missing required fields</div>`;
    validation.missing.forEach(({label,sheet}) => {
      const row = document.createElement('div');
      row.style.cssText = 'font-size:12px;color:#8a5c00;padding:2px 0;cursor:pointer;';
      row.innerHTML = `⚠ ${label} <span style="color:#aaa">· ${sheet}</span>`;
      row.onclick = () => {
        const sheetMap = {'Dev. Potential':'potential','Revenue':'revenue','Dev. Costs':'costs','Financing':'financing'};
        const target = sheetMap[sheet];
        if(target){Store.navigate(target);renderApp();}
      };
      warnCard.appendChild(row);
    });
    wrap.appendChild(warnCard);
  }

  // Generate button
  const generateBtn = document.createElement('button');
  generateBtn.className = 'btn btn-primary btn-block';
  generateBtn.style.cssText = 'padding:16px;font-size:15px;margin-bottom:10px;';
  generateBtn.textContent = '⚡ Generate Proforma';
  generateBtn.disabled = validation.missing.length > 0;
  generateBtn.onclick = () => generateProforma(s, calc);
  wrap.appendChild(generateBtn);

  if(validation.missing.length > 0) {
    const hint = document.createElement('div');
    hint.style.cssText = 'text-align:center;font-size:12px;color:#888;margin-bottom:16px;';
    hint.textContent = 'Complete all required fields to enable generation';
    wrap.appendChild(hint);
  }

  wrap.appendChild(navRow(
    ()=>{Store.navigate('schedule');renderApp();},
    null
  ));

  return wrap;
}

  const siteSF = U.p(s.siteSF, 1)
  const GOLD = '#c9993a'
  const isLandscape = s.printOrientation === 'landscape'

  const dscrOk = calc.dscr >= 1.10
  const dscrWarn = calc.dscr > 0 && calc.dscr < 1.10

// ── AI PLAN EXTRACTION ────────────────────────────────────────────
async function analysePlans(s) {
  if(!s.apiKey||!s.uploadedFiles.length) return;
  showToast('Analysing plans with Claude AI...');

  try {
    const parts = [];
    for(const file of s.uploadedFiles) {
      const b64 = await fileToB64(file);
      const isPDF = file.type.includes('pdf')||(file.name||'').toLowerCase().endsWith('.pdf');
      if(isPDF) parts.push({type:'document',source:{type:'base64',media_type:'application/pdf',data:b64}});
      else       parts.push({type:'image',  source:{type:'base64',media_type:file.type||'image/jpeg',data:b64}});
    }
    parts.push({type:'text',text:`Extract all project data from these architectural plans. Return ONLY valid JSON with these exact keys (use null for not found):
{"address":"","city":"","province":"","pid":"","currentZoning":"","proposedZoning":"","projType":"","storeys":null,"fsr":null,"siteSF":null,"gfa":null,"netSF":null,"units":null,"studio":null,"oneBed":null,"oneBedDen":null,"twoBed":null,"twoBedDen":null,"threeBed":null,"adaptable":null,"parkingRes":null,"parkingVis":null,"ev":null,"bike":null,"storage":null,"frontage":null,"depth":null,"height":"","amenityIndoor":null,"amenityOutdoor":null,"legal":""}
Return ONLY the JSON. No markdown, no backticks, no explanation.`});

    const r = await fetch('https://api.anthropic.com/v1/messages',{
      method:'POST',
      headers:{'Content-Type':'application/json','x-api-key':s.apiKey,'anthropic-version':'2023-06-01','anthropic-dangerous-direct-browser-access':'true'},
      body:JSON.stringify({model:'claude-sonnet-4-20250514',max_tokens:800,messages:[{role:'user',content:parts}]})
    });
    if(!r.ok) throw new Error('API error '+r.status);
    const data   = await r.json();
    const parsed = JSON.parse(data.content[0].text.replace(/```json|```/g,'').trim());
    const ts     = new Date().toLocaleString('en-CA');

    // Map extracted data to state
    const updates = {};
    const propUpdates = {};
    const sources = {};
    const numKeys = ['storeys','fsr','siteSF','gfa','netSF','units','studio','oneBed','oneBedDen','twoBed','twoBedDen','threeBed','adaptable','parkingRes','parkingVis','ev','bike','storage','amenityIndoor','amenityOutdoor'];
    const strKeys = ['projType','height'];
    const propKeys = ['address','city','province','pid','currentZoning','proposedZoning','legal','frontage','depth'];

    numKeys.forEach(k=>{if(parsed[k]!=null){updates[k]=String(parsed[k]);sources[k]={source:'AI Plan Extraction',ts,confidence:'medium'};}});
    strKeys.forEach(k=>{if(parsed[k]){updates[k]=parsed[k];}});
    propKeys.forEach(k=>{if(parsed[k]){propUpdates[k]=parsed[k];sources[k]={source:'AI Plan Extraction',ts,confidence:'medium'};}});

    Store.set(updates);
    if(Object.keys(propUpdates).length>0) {
      Store.setProp(s.properties[0].id,{...propUpdates,verified:true,_sources:sources});
    }
    renderApp();
    showToast('✓ Plans analysed — review and confirm extracted data');
  } catch(e) {
    showToast('AI extraction failed — check API key and try again',true);
    console.error('[AI Extraction]',e);
  }
}

function fileToB64(file){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result.split(',')[1]);
    r.onerror=rej;
    r.readAsDataURL(file);
  });
}

// This is the top-level render function.
// It reads state, builds the entire UI, and mounts it.
// No diffing — full re-render on every state change.
// Fast enough for this use case. Future: add virtual DOM diffing.

let _currentSheet = null;
let _renderScheduled = false;

function renderApp() {
  // Debounce rapid successive renders
  if(_renderScheduled) return;
  _renderScheduled = true;
  requestAnimationFrame(() => {
    _renderScheduled = false;
    _doRender();
  });
}

  content.innerHTML = '';

    property:  renderSheet_property,
    potential: renderSheet_potential,

    costs:     renderSheet_costs,
    financing: renderSheet_financing,
    returns:   renderSheet_returns,
    rlv:       renderSheet_rlv,
    comps:     renderSheet_comps,
    schedule:  renderSheet_schedule,
    generate:  renderSheet_generate,
  };

  const renderer = sheetRenderers[s.currentSheet];
  if(renderer) {
    try {
      content.appendChild(renderer(s));
    } catch(e) {
      // Render error — show recovery UI
      console.error('[RenderError]', s.currentSheet, e);
      // Reset to project sheet on error to avoid stuck state
      Store._state.currentSheet = 'project';
      content.innerHTML = `
        <div style="max-width:600px;margin:60px auto;text-align:center;padding:0 20px;">
          <div style="font-size:36px;margin-bottom:16px">⚠️</div>
          <h2 style="font-size:18px;margin-bottom:8px">This section encountered an error</h2>
          <p style="color:#555;font-size:13px;margin-bottom:20px;line-height:1.6">Your data is safe. Click another tab to continue or try reloading.</p>
          <button onclick="Store._state.currentSheet='project';Store._notify();" style="padding:10px 24px;background:#000;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:700;">Go to Project Type</button>
          <pre style="margin-top:20px;font-size:10px;color:#aaa;text-align:left;background:#f5f5f5;padding:12px;border-radius:6px;overflow:auto;">${e.toString()}</pre>
        </div>
      `;
    }
  }
}

// ── BOOT ─────────────────────────────────────────────────────────
function boot() {
  // Inject CSS
  const style = document.createElement('style');
  style.textContent = CSS;
  document.head.appendChild(style);

  // Create app root
  const app = document.getElementById('app');
  if(!app) { console.error('[Boot] #app element not found'); return; }

  // Subscribe to state changes — re-render on every update
  Store.subscribe(() => renderApp());

  // Initial render
  renderApp();

  console.log('[ProformaApp v8] Booted successfully');
}


// Tab order fix — prevent tab from going to browser address bar
document.addEventListener('keydown', function(e) {
  if(e.key === 'Tab') {
    const inputs = Array.from(document.querySelectorAll('#sheet-content input:not([disabled]), #sheet-content select:not([disabled]), #sheet-content textarea:not([disabled])'));
    const current = document.activeElement;
    const idx = inputs.indexOf(current);
    if(idx >= 0) {
      e.preventDefault();
      const next = e.shiftKey ? inputs[idx - 1] : inputs[idx + 1];
      if(next) { next.focus(); next.select && next.select(); }
    }
  }
});

// Start when DOM is ready
if(document.readyState==='loading') {
  document.addEventListener('DOMContentLoaded', boot);
} else {
  boot();
}

</script>
